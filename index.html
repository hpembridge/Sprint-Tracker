        <div style="display:flex;gap:4px;align-items:center;justify-content:flex-end">
          <button class="btn-icon" onclick="openSprintEditFlyout('${sprint.id}')" title="Edit sprint"><i class="fa-solid fa-pen-to-square"></i></button>
          <button class="btn-icon danger" onclick="deleteSprint('${sprint.id}')" title="Delete"><i class="fa-solid fa-trash-can"></i></button>
        </div>
      </td>
    </tr>`;
      }).join('');

      tbody.innerHTML = html;
      recentlyMoved.clear();
    }

    // ── View Toggle ───────────────────────────────────────────────────────────────
    window.setView = function (v) {
      currentView = v;
      document.getElementById('app').style.display = v === 'table' ? 'block' : 'none';
      document.getElementById('calendar-view').style.display = v === 'calendar' ? 'flex' : 'none';
      document.getElementById('gantt-view').style.display = v === 'gantt' ? 'flex' : 'none';
      document.getElementById('lane-view').style.display = v === 'lane' ? 'block' : 'none';
      document.getElementById('view-table-btn').classList.toggle('active', v === 'table');
      document.getElementById('view-cal-btn').classList.toggle('active', v === 'calendar');
      document.getElementById('view-gantt-btn').classList.toggle('active', v === 'gantt');
      document.getElementById('view-lane-btn').classList.toggle('active', v === 'lane');
      if (v === 'calendar') { buildGlobalDropdowns(); renderCalendar(); }
      if (v === 'gantt') { buildGlobalDropdowns(); renderGantt(); }
      if (v === 'lane') renderLaneView();
      if (v === 'table') render();
    }

    // ── Calendar ─────────────────────────────────────────────────────────────────
    const CAL_STEPS = [
      { key: 'review', label: 'Review', icon: 'fa-magnifying-glass', cls: 'review' },
      { key: 'handoff', label: 'Handoff', icon: 'fa-layer-group', cls: 'handoff' },
      { key: 'kickoff', label: 'Dev Kickoff', icon: 'fa-code', cls: 'kickoff' },
      { key: 'test', label: 'Test', icon: 'fa-flask', cls: 'test' },
      { key: 'release', label: 'Release', icon: 'fa-rocket', cls: 'release' },
    ];
    // Start on current quarter
    const _now = new Date();
    let calQuarterStart = Math.floor(_now.getMonth() / 3) * 3; // 0, 3, 6, or 9
    let calYear = _now.getFullYear();
    let activeFilters = new Set(['review', 'handoff', 'kickoff', 'test', 'release']);
    // null = show all; Set of IDs = filtered subset
    let gInitFilter = null;
    let gEpicFilter = null;
    let gSprintFilter = null;

    function buildGlobalDropdowns() {
      // Initiatives — always show all
      const initItems = document.getElementById('dd-items-initiative');
      if (initItems) {
        initItems.innerHTML = initiatives.map(i =>
          `<label class="cal-dropdown-item">
            <input type="checkbox" ${!gInitFilter || gInitFilter.has(i.id) ? 'checked' : ''}
              onchange="calDropdownChange('initiative','${i.id}',this.checked)">
            ${escHtml(i.name)}
          </label>`
        ).join('');
      }

      // Epics — only those belonging to visible initiatives
      const visibleInitIds = gInitFilter ? [...gInitFilter] : initiatives.map(i => i.id);
      const visibleEpics = epics.filter(e => visibleInitIds.includes(e.initiative_id));
      const epicItems = document.getElementById('dd-items-epic');
      if (epicItems) {
        epicItems.innerHTML = visibleEpics.map(e =>
          `<label class="cal-dropdown-item">
            <input type="checkbox" ${!gEpicFilter || gEpicFilter.has(e.id) ? 'checked' : ''}
              onchange="calDropdownChange('epic','${e.id}',this.checked)">
            ${escHtml(e.name)}
          </label>`
        ).join('') || '<div style="padding:8px 12px;font-size:11px;color:var(--text-muted)">No epics</div>';
      }

      // Sprints — only those under visible initiatives + visible epics
      const visibleEpicIds = gEpicFilter ? [...gEpicFilter] : visibleEpics.map(e => e.id);
      const visibleSprints = computeAllSprints().filter(s =>
        visibleInitIds.includes(s.initiative_id) && visibleEpicIds.includes(s.epic_id)
      );
      const sprintItems = document.getElementById('dd-items-sprint');
      if (sprintItems) {
        sprintItems.innerHTML = visibleSprints.map(s =>
          `<label class="cal-dropdown-item">
            <input type="checkbox" ${!gSprintFilter || gSprintFilter.has(s.id) ? 'checked' : ''}
              onchange="calDropdownChange('sprint','${s.id}',this.checked)">
            ${escHtml(sprintLabel(s, computeSprintNumbers()))}
          </label>`
        ).join('') || '<div style="padding:8px 12px;font-size:11px;color:var(--text-muted)">No sprints</div>';
      }

      // Update button highlight states
      ['initiative', 'epic', 'sprint'].forEach(t => {
        const filter = t === 'initiative' ? gInitFilter : t === 'epic' ? gEpicFilter : gSprintFilter;
        document.getElementById('dd-btn-' + t)?.classList.toggle('has-filter', filter !== null);
      });
    }

    window.toggleCalDropdown = (type) => {
      ['initiative', 'epic', 'sprint'].forEach(t => {
        const menu = document.getElementById('dd-menu-' + t);
        if (t === type) menu.classList.toggle('open');
        else menu.classList.remove('open');
      });
    };

    window.calDropdownChange = (type, id, checked) => {
      // Collect checked IDs from DOM for this dropdown
      const checkboxes = [...document.querySelectorAll(`#dd-items-${type} input[type=checkbox]`)];
      const checkedIds = checkboxes.filter(c => c.checked).map(c => {
        const m = c.getAttribute('onchange').match(/'([^']+)',this/);
        return m ? m[1] : null;
      }).filter(Boolean);

      if (type === 'initiative') {
        const allIds = initiatives.map(i => i.id);
        gInitFilter = checkedIds.length === allIds.length ? null : new Set(checkedIds);
        // Reset downstream filters that may no longer be valid
        if (gEpicFilter) {
          const visInits = gInitFilter ? [...gInitFilter] : allIds;
          const validEpicIds = epics.filter(e => visInits.includes(e.initiative_id)).map(e => e.id);
          const pruned = [...gEpicFilter].filter(id => validEpicIds.includes(id));
          gEpicFilter = pruned.length === validEpicIds.length ? null : new Set(pruned);
        }
        gSprintFilter = null; // reset sprints when initiative changes
      } else if (type === 'epic') {
        const visInitIds = gInitFilter ? [...gInitFilter] : initiatives.map(i => i.id);
        const visEpics = epics.filter(e => visInitIds.includes(e.initiative_id));
        gEpicFilter = checkedIds.length === visEpics.length ? null : new Set(checkedIds);
        gSprintFilter = null; // reset sprints when epic changes
      } else {
        const visInitIds = gInitFilter ? [...gInitFilter] : initiatives.map(i => i.id);
        const visEpicIds = gEpicFilter ? [...gEpicFilter] : epics.filter(e => visInitIds.includes(e.initiative_id)).map(e => e.id);
        const visSprints = computeAllSprints().filter(s => visInitIds.includes(s.initiative_id) && visEpicIds.includes(s.epic_id));
        gSprintFilter = checkedIds.length === visSprints.length ? null : new Set(checkedIds);
      }

      buildGlobalDropdowns();
      if (currentView === 'calendar') renderCalendar();
      else if (currentView === 'gantt') renderGantt();
      else render();
    };

    window.selectAllCal = (type) => {
      if (type === 'initiative') { gInitFilter = null; gEpicFilter = null; gSprintFilter = null; }
      else if (type === 'epic') { gEpicFilter = null; gSprintFilter = null; }
      else { gSprintFilter = null; }
      buildGlobalDropdowns();
      if (currentView === 'calendar') renderCalendar();
      else if (currentView === 'gantt') renderGantt();
      else render();
    };

    // Close dropdowns when clicking outside
    document.addEventListener('click', e => {
      if (!e.target.closest('.cal-dropdown-wrap')) {
        document.querySelectorAll('.cal-dropdown-menu.open').forEach(m => m.classList.remove('open'));
      }
    });

    window.calPrev = () => {
      calQuarterStart -= 3;
      if (calQuarterStart < 0) { calQuarterStart = 9; calYear--; }
      renderCalendar();
    };
    window.calNext = () => {
      calQuarterStart += 3;
      if (calQuarterStart > 9) { calQuarterStart = 0; calYear++; }
      renderCalendar();
    };
    window.ganttPrev = () => {
      calQuarterStart -= 3;
      if (calQuarterStart < 0) { calQuarterStart = 9; calYear--; }
      renderGantt();
    };
    window.ganttNext = () => {
      calQuarterStart += 3;
      if (calQuarterStart > 9) { calQuarterStart = 0; calYear++; }
      renderGantt();
    };
    window.toggleFilter = (key) => {
      if (activeFilters.has(key)) activeFilters.delete(key); else activeFilters.add(key);
      document.getElementById('fp-' + key).classList.toggle('off', !activeFilters.has(key));
      renderCalendar();
    };

    function renderCalendar() {
      const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const DOW_LABELS = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri']; // Mon=1 … Fri=5

      const endMonth = calQuarterStart + 2;
      const qLabel = `Q${Math.floor(calQuarterStart / 3) + 1} ${calYear}`;
      document.getElementById('cal-month-label').textContent = qLabel;

      // Build date→chips map
      const computed = computeAllSprints();
      const dateMap = {};
      computed.forEach(s => {
        if (gInitFilter && !gInitFilter.has(s.initiative_id)) return;
        if (gEpicFilter && !gEpicFilter.has(s.epic_id)) return;
        if (gSprintFilter && !gSprintFilter.has(s.id)) return;
        const name = sprintLabel(s, computeSprintNumbers());
        const init = initiatives.find(i => i.id === s.initiative_id);
        const epic = epics.find(e => e.id === s.epic_id);
        const initColorIndex = init ? init.color_index % INIT_HUES.length : 0;
        const chipStyle = epic ? epicChipStyle(epic, initColorIndex) : '';
        CAL_STEPS.forEach(step => {
          if (!activeFilters.has(step.key)) return;
          const dateStr = s[step.key];
          if (!dateStr) return;
          if (!dateMap[dateStr]) dateMap[dateStr] = [];
          dateMap[dateStr].push({ ...step, name, chipStyle, sprintId: s.id });
        });
      });

      const todayISO = toISO(new Date());

      // Helper: render one month block
      function renderMonth(yr, mo) {
        const daysInMonth = new Date(yr, mo + 1, 0).getDate();
        // firstDOW: 1=Mon … 5=Fri, 6=Sat, 0=Sun
        const firstDOW = new Date(yr, mo, 1).getDay(); // 0=Sun … 6=Sat
        // Convert to Mon-based index (Mon=0 … Fri=4, Sat=5, Sun=6)
        const firstOffset = (firstDOW + 6) % 7; // Mon-based offset of 1st of month

        let cells = DOW_LABELS.map(d => `<div class="cal-dow-header">${d}</div>`).join('');

        // Leading blanks (only Mon–Fri blanks)
        const leadBlanks = Math.min(firstOffset, 5); // cap at 5 (whole row)
        for (let i = 0; i < leadBlanks; i++) cells += `<div class="cal-cell other-month"></div>`;

        // Days of month — skip Sat (dow=6) and Sun (dow=0)
        for (let d = 1; d <= daysInMonth; d++) {
          const dow = new Date(yr, mo, d).getDay();
          if (dow === 0 || dow === 6) continue;
          const iso = `${yr}-${String(mo + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
          const isToday = iso === todayISO;
          const chips = renderChips(dateMap[iso] || []);
          cells += `<div class="cal-cell${isToday ? ' today' : ''}">
            <div class="cal-day-num"><span class="day-n">${d}</span></div>
            <div class="cal-chips">${chips}</div>
          </div>`;
        }

        return `<div class="cal-month-block">
          <div class="cal-month-heading">${MONTHS[mo]} ${yr}</div>
          <div class="cal-grid">${cells}</div>
        </div>`;
      }

      let html = '';
      for (let i = 0; i < 3; i++) {
        const mo = calQuarterStart + i;
        const yr = calYear + Math.floor(mo / 12);
        html += renderMonth(yr, mo % 12);
      }

      document.getElementById('cal-grid-wrap').innerHTML = html;
    }

    function renderChips(entries) {
      return entries.map(e =>
        `<div class="cal-chip" style="${e.chipStyle};cursor:pointer" onclick="openSprintFlyout('${e.sprintId}')"><i class="fa-solid ${e.icon} chip-icon"></i><span>${escHtml(e.name)}</span></div>`
      ).join('');
    }

    // ── Gantt ─────────────────────────────────────────────────────────────────────
    function renderGantt() {
      const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const outer = document.getElementById('gantt-scroll-outer');
      if (!outer) return;

      const qLabel = `Q${Math.floor(calQuarterStart / 3) + 1} ${calYear}`;
      const qLabelEl = document.getElementById('gantt-quarter-label');
      if (qLabelEl) qLabelEl.textContent = qLabel;

      const qStart = new Date(calYear, calQuarterStart, 1);
      const qEndMo = calQuarterStart + 2;
      const qEndYrOff = Math.floor((qEndMo + 1) / 12);
      const qEnd = new Date(calYear + qEndYrOff, (qEndMo + 1) % 12, 0);
      const totalMs = qEnd.getTime() - qStart.getTime() + 86400000;

      function datePct(iso) {
        if (!iso) return null;
        const ms = new Date(iso + 'T00:00:00').getTime() - qStart.getTime();
        return Math.max(0, Math.min(100, ms / totalMs * 100));
      }

      const computed = computeAllSprints();
      const numMap = computeSprintNumbers();
      const todayISO = toISO(new Date());

      const visibleSprints = computed.filter(s => {
        if (gInitFilter && !gInitFilter.has(s.initiative_id)) return false;
        if (gEpicFilter && !gEpicFilter.has(s.epic_id)) return false;
        if (gSprintFilter && !gSprintFilter.has(s.id)) return false;
        return true;
      });

      // Week markers (Mondays)
      const weeks = [];
      const wd = new Date(qStart);
      while (wd.getDay() !== 1) wd.setDate(wd.getDate() + 1);
      while (wd <= qEnd) {
        weeks.push({ pct: datePct(toISO(wd)), label: `${MONTHS[wd.getMonth()]} ${wd.getDate()}` });
        wd.setDate(wd.getDate() + 7);
      }

      const LABEL_W = 220;
      const ROW_H = 36;
      const INIT_H = 28;
      const EPIC_H = 24;

      const usedInits = initiatives
        .slice().sort((a, b) => a.order - b.order)
        .filter(i => visibleSprints.some(s => s.initiative_id === i.id));

      let labelRows = '';
      let barRows = '';

      usedInits.forEach(init => {
        const pal = PALETTE[init.color_index % PALETTE.length];
        const initColorIndex = init.color_index % INIT_HUES.length;
        const usedEpics = epics
          .filter(e => e.initiative_id === init.id && visibleSprints.some(s => s.epic_id === e.id))
          .sort((a, b) => a.order - b.order);

        labelRows += `<div class="gantt-label-init" style="height:${INIT_H}px">
          <span class="init-badge" style="background:${pal.bg};color:${pal.text};border:1px solid ${pal.border};font-size:11px;padding:1px 8px;border-radius:4px">${escHtml(init.name)}</span>
        </div>`;
        barRows += `<div class="gantt-bar-row gantt-bar-init" style="height:${INIT_H}px"></div>`;

        usedEpics.forEach(epic => {
          const epicSprints = visibleSprints.filter(s => s.epic_id === epic.id).sort((a, b) => a.global_order - b.global_order);
          const chipStyle = epicChipStyle(epic, initColorIndex);

          labelRows += `<div class="gantt-label-epic" style="height:${EPIC_H}px">${escHtml(epic.name)}</div>`;
          barRows += `<div class="gantt-bar-row gantt-bar-epic" style="height:${EPIC_H}px"></div>`;

          epicSprints.forEach(sprint => {
            const label = sprintLabel(sprint, numMap);
            const steps = sprint.completed_steps || [];

            let barHtml = '';
            if (sprint.review && sprint.release) {
              const rawLeft = (new Date(sprint.review + 'T00:00:00') - qStart) / totalMs * 100;
              const rawRight = (new Date(sprint.release + 'T00:00:00') - qStart) / totalMs * 100;
              const left = Math.max(0, rawLeft);
              const right = Math.min(100, rawRight);
              if (right > left) {
                const spanPct = right - left;
                const phases = [
                  { key: 'review', date: sprint.review },
                  { key: 'handoff', date: sprint.handoff },
                  { key: 'kickoff', date: sprint.kickoff },
                  { key: 'test', date: sprint.test },
                  { key: 'release', date: sprint.release },
                ];
                const markers = phases.map(p => {
                  const pct = datePct(p.date);
                  if (pct === null) return '';
                  const localPct = ((pct - left) / spanPct * 100).toFixed(2);
                  const done = steps.includes(p.key) || (p.key === 'release' && sprint.released);
                  return `<div class="gantt-marker ${done ? 'done' : ''}" style="left:${localPct}%" title="${p.key}: ${p.date || ''}"></div>`;
                }).join('');
                barHtml = `<div class="gantt-bar-inner" style="left:${left.toFixed(2)}%;width:${(right - left).toFixed(2)}%;${chipStyle}" onclick="openSprintFlyout('${sprint.id}')" title="${escHtml(label)}">
                  ${markers}
                  <span class="gantt-bar-label">${escHtml(label)}</span>
                </div>`;
              }
            }

            labelRows += `<div class="gantt-label-sprint" style="height:${ROW_H}px">
              <button class="sprint-label-chip" style="${chipStyle}" onclick="openSprintFlyout('${sprint.id}')">${escHtml(label)}</button>
            </div>`;
            barRows += `<div class="gantt-bar-row" style="height:${ROW_H}px;position:relative">${barHtml}</div>`;
          });
        });
      });

      if (!usedInits.length) {
        outer.innerHTML = `<div style="padding:40px;text-align:center;color:var(--text-muted)">No sprints match the current filters.</div>`;
        return;
      }

      const weekHeaderHtml = weeks.map(w =>
        `<div class="gantt-week-tick" style="left:${w.pct.toFixed(2)}%">${w.label}</div>`
      ).join('');

      const weekLineHtml = weeks.map(w =>
        `<div class="gantt-week-line" style="left:${w.pct.toFixed(2)}%"></div>`
      ).join('');

      const todayPct = datePct(todayISO);
      const todayLineHtml = todayPct !== null
        ? `<div class="gantt-today-line" style="left:${todayPct.toFixed(2)}%"></div>` : '';

      outer.innerHTML = `
        <div class="gantt-inner" style="min-width:900px">
          <div style="display:flex;height:32px">
            <div style="width:${LABEL_W}px;min-width:${LABEL_W}px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);position:sticky;left:0;z-index:10"></div>
            <div style="flex:1;position:relative;height:32px;border-bottom:1px solid var(--border)">${weekHeaderHtml}</div>
          </div>
          <div style="display:flex">
            <div style="width:${LABEL_W}px;min-width:${LABEL_W}px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);position:sticky;left:0;z-index:10">${labelRows}</div>
            <div style="flex:1;position:relative">${weekLineHtml}${todayLineHtml}${barRows}</div>
          </div>
        </div>`;
    }

    // ── Field Update Handlers ─────────────────────────────────────────────────────
    window.renameInit = async (id, name) => {
      if (!name.trim()) return;
      await updateDoc(doc(db, 'initiatives', id), { name: name.trim() });
    };
    window.renameEpic = async (id, name) => {
      if (!name.trim()) return;
      await updateDoc(doc(db, 'epics', id), { name: name.trim() });
    };

    window.updateDesc = async (id, val) => {
      await patchSprint(id, { description: val.trim() });
    };
    window.updateLength = async (id, val) => {
      const n = parseFloat(val);
      if (!isNaN(n) && n > 0) await patchSprint(id, { length_weeks: n });
    };
    window.setKickoff = async (id, val) => {
      if (!val) return;
      await patchSprint(id, { manual_kickoff: val });
    };
    window.clearKickoff = async (id) => {
      await patchSprint(id, { manual_kickoff: null });
    };
    window.toggleReleased = async (id) => {
      const sprint = sprints.find(s => s.id === id);
      if (!sprint) return;
      if (!sprint.released) {
        const computed = computeAllSprints().find(s => s.id === id);
        await patchSprint(id, {
          released: true,
          manual_kickoff: computed.kickoff,
          frozen_test: computed.test,
          frozen_release: computed.release,
        });
      } else {
        await patchSprint(id, { released: false, frozen_test: null, frozen_release: null });
      }
    };

    window.toggleStep = async (id, step) => {
      const sprint = sprints.find(s => s.id === id);
      if (!sprint) return;
      if (step === 'release') {
        await toggleReleased(id);
        return;
      }
      const steps = Array.isArray(sprint.completed_steps) ? [...sprint.completed_steps] : [];
      const idx = steps.indexOf(step);
      if (idx === -1) steps.push(step); else steps.splice(idx, 1);
      await patchSprint(id, { completed_steps: steps });
    };

    // ── Entity Text Inputs ────────────────────────────────────────────────────────
    window.saveEntityText = async function (input, sprintId, type) {
      const name = input.value.trim();
      const sprint = sprints.find(s => s.id === sprintId);
      if (type === 'initiative') {
        await resolveAndSaveInitiative(sprintId, name);
      } else {
        await resolveAndSaveEpic(sprintId, name, sprint?.initiative_id);
      }
    };

    // ── Entity Inline Editing (legacy, kept for internal use) ─────────────────────
    window.editEntityCell = function (triggerEl, sprintId, type) {
      const cell = triggerEl.closest('.entity-cell');
      const sprint = sprints.find(s => s.id === sprintId);
      const currentId = type === 'initiative' ? sprint?.initiative_id : sprint?.epic_id;
      const currentName = type === 'initiative'
        ? initiatives.find(i => i.id === currentId)?.name || ''
        : epics.find(e => e.id === currentId)?.name || '';
      const listId = type === 'initiative' ? 'initiative-list' : 'epic-list';

      cell.innerHTML = `<input type="text" class="entity-input"
    value="${escHtml(currentName)}"
    list="${listId}"
    placeholder="${type === 'initiative' ? 'Initiative…' : 'Epic…'}"
    onblur="saveEntityCell(this,'${sprintId}','${type}')"
    onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.cancel='1';this.blur();}">`;
      const input = cell.querySelector('input');
      input.focus();
      input.select();
    };

    window.saveEntityCell = async function (input, sprintId, type) {
      if (input.dataset.cancel) return;
      const name = input.value.trim();
      const sprint = sprints.find(s => s.id === sprintId);
      if (type === 'initiative') {
        await resolveAndSaveInitiative(sprintId, name);
      } else {
        await resolveAndSaveEpic(sprintId, name, sprint?.initiative_id);
      }
    };

    async function resolveAndSaveInitiative(sprintId, name) {
      if (!name) { await patchSprint(sprintId, { initiative_id: null }); return; }
      let init = initiatives.find(i => i.name.toLowerCase() === name.toLowerCase());
      if (!init) {
        const maxOrder = Math.max(0, ...initiatives.map(i => i.order));
        const color_index = initiatives.length % PALETTE.length;
        const ref = await addDoc(collection(db, 'initiatives'), { name, order: maxOrder + 1, color_index });
        await patchSprint(sprintId, { initiative_id: ref.id });
      } else {
        await patchSprint(sprintId, { initiative_id: init.id });
      }
    }

    async function resolveAndSaveEpic(sprintId, name, initiativeId) {
      if (!name) { await patchSprint(sprintId, { epic_id: null }); return; }
      let epic = epics.find(e => e.name.toLowerCase() === name.toLowerCase() && e.initiative_id === initiativeId);
      if (!epic) epic = epics.find(e => e.name.toLowerCase() === name.toLowerCase());
      if (!epic) {
        const maxOrder = Math.max(0, ...epics.map(e => e.order));
        const siblingCount = epics.filter(e => e.initiative_id === (initiativeId || null)).length;
        const ref = await addDoc(collection(db, 'epics'), { name, order: maxOrder + 1, initiative_id: initiativeId || null, color_index: siblingCount });
        await patchSprint(sprintId, { epic_id: ref.id });
      } else {
        await patchSprint(sprintId, { epic_id: epic.id });
      }
    }

    // ── Flyout Panels ─────────────────────────────────────────────────────────────
    window.openInitiativeFlyout = function (id) {
      const init = initiatives.find(i => i.id === id);
      if (!init) return;
      const pal = PALETTE[init.color_index % PALETTE.length];
      const initEpics = epics.filter(e => e.initiative_id === id).sort((a, b) => a.order - b.order);
      const initSprints = sprints.filter(s => s.initiative_id === id);
      const released = initSprints.filter(s => s.released).length;
      const planned = initSprints.filter(s => !s.released).length;

      document.getElementById('flyout-title').innerHTML =
        `<span class="init-badge" style="background:${pal.bg};color:${pal.text};border:1px solid ${pal.border}">${escHtml(init.name)}</span>`;

      document.getElementById('flyout-body').innerHTML = `
    <div class="flyout-stats">
      <div class="flyout-stat"><strong>${planned}</strong>Planned</div>
      <div class="flyout-stat"><strong>${released}</strong>Released</div>
      <div class="flyout-stat"><strong>${initEpics.length}</strong>Epics</div>
    </div>
    <div class="flyout-section-title">Epics</div>
    ${initEpics.length === 0 ? '<p class="flyout-empty">No epics yet</p>' :
          initEpics.map(epic => {
            const es = sprints.filter(s => s.epic_id === epic.id);
            const er = es.filter(s => s.released).length;
            const ep = es.filter(s => !s.released).length;
            return `<div class="flyout-epic-item" onclick="openEpicFlyout('${epic.id}')">
          <div>
            <div class="flyout-epic-name">${escHtml(epic.name)}</div>
            <div class="flyout-epic-counts">${ep} planned · ${er} released</div>
          </div>
          <i class="fa-solid fa-chevron-right" style="color:var(--border)"></i>
        </div>`;
          }).join('')
        }`;

      openFlyout();
    };

    window.openEpicFlyout = function (id) {
      const epic = epics.find(e => e.id === id);
      if (!epic) return;
      const init = initiatives.find(i => i.id === epic.initiative_id);
      const pal = init ? PALETTE[init.color_index % PALETTE.length] : null;
      const computed = computeAllSprints();
      const numMap = computeSprintNumbers();
      const epicSprints = computed.filter(s => s.epic_id === id).sort((a, b) => a.global_order - b.global_order);

      document.getElementById('flyout-title').textContent = epic.name;

      document.getElementById('flyout-body').innerHTML = `

      ${init ? `<button class="flyout-bc-link" onclick="openInitiativeFlyout('${init.id}')">${escHtml(init.name)}</button>` : ''}

      <span class="flyout-bc-current">${escHtml(epic.name)}</span>
    </div>

          epicSprints.map(sprint => {
            const num = numMap.get(sprint.id) ?? '—';
            const initColorIndex = init ? init.color_index % INIT_HUES.length : 0;
            const chipStyle = epicChipStyle(epic, initColorIndex);
            return `
        <div class="flyout-sprint-item ${sprint.released ? 'is-released' : ''}" onclick="openSprintFlyout('${sprint.id}')" style="cursor:pointer">
          <div class="flyout-sprint-header">

          </div>
        </div>`;
          }).join('')
        }`;

      openFlyout();

    // ── Sprint read-only view ─────────────────────────────────────────────────────
    window.openSprintFlyout = function (id) {
      const sprint = sprints.find(s => s.id === id);
      if (!sprint) return;
      const computed = computeAllSprints().find(s => s.id === id);
      const init = initiatives.find(i => i.id === sprint.initiative_id);
      const epic = epics.find(e => e.id === sprint.epic_id);

      const initColorIndex = init ? init.color_index % INIT_HUES.length : 0;
      const chipStyle = epic ? epicChipStyle(epic, initColorIndex) : '';
      const label = sprintLabel(sprint, computeSprintNumbers());
      const steps = sprint.completed_steps || [];
      const today = toISO(new Date());

      const stepStatus = (key, date) => {
        const done = steps.includes(key) || (key === 'release' && sprint.released);

          ${epic ? `<button class="flyout-bc-link" onclick="openEpicFlyout('${epic.id}')">${escHtml(epic.name)}</button><span class="flyout-bc-sep">›</span>` : ''}

                  <a href="${escHtml(r.url)}" target="_blank" style="font-size:11px;color:var(--accent);word-break:break-all">${escHtml(r.url)}</a>
                </div>
                <button class="btn-icon danger" onclick="removeResource('${id}',${i});openSprintEditFlyout('${id}')" title="Remove"><i class="fa-solid fa-xmark"></i></button>
              </div>`).join('')}
          </div>
          <button class="resource-add-btn" style="margin-top:6px" onclick="openPopover('${id}',null,this)"><i class="fa-solid fa-plus"></i> Add resource</button>
        </div>

        <div style="display:flex;gap:8px;margin-top:16px">
          <button class="btn btn-primary" onclick="saveSprintEdit('${id}')">Save</button>
          <button class="btn btn-secondary" onclick="openSprintFlyout('${id}')">Cancel</button>
        </div>`;

      openFlyout();
    };

    window.saveSprintEdit = async function (id) {
      const initName = document.getElementById('edit-initiative')?.value.trim();
      const epicName = document.getElementById('edit-epic')?.value.trim();
      const length = parseInt(document.getElementById('edit-length')?.value, 10);
      const desc = document.getElementById('edit-desc')?.value.trim();
      const kickoffEl = document.getElementById('edit-kickoff');
      const kickoff = kickoffEl?.value;
      const wasManual = kickoffEl?.dataset.wasManual === 'true';
      const autoKickoff = kickoffEl?.dataset.auto;

      // Patch simple fields
      const patch = {};
      if (!isNaN(length) && length >= 2) patch.length_weeks = length;
      patch.description = desc;
      // Only pin manual_kickoff if the sprint already had one, or the user changed the date
      if (kickoff && (wasManual || kickoff !== autoKickoff)) patch.manual_kickoff = kickoff;
      await patchSprint(id, patch);

      // Resolve initiative / epic by name
      await saveEntityText({ value: initName }, id, 'initiative');
      await saveEntityText({ value: epicName }, id, 'epic');

      openSprintFlyout(id);
    };

    function openFlyout() {
      document.getElementById('flyout-panel').classList.add('open');
      document.getElementById('flyout-overlay').classList.add('open');
    }
    window.closeFlyout = function () {
      document.getElementById('flyout-panel').classList.remove('open');
      document.getElementById('flyout-overlay').classList.remove('open');
    };

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function escHtml(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Renders a description string as HTML — bullet lines (starting with •) become
    // <ul><li> groups; plain lines become <p>. Safe: content is escHtml'd.
    function renderDesc(raw) {
      if (!raw) return '';
      const lines = raw.split('\n');
      let html = '';
      let inList = false;
      for (const line of lines) {
        const isBullet = /^- /.test(line);
        if (isBullet) {
          if (!inList) { html += '<ul>'; inList = true; }
          html += `<li>${escHtml(line.replace(/^-\s*/, ''))}</li>`;
        } else {
          if (inList) { html += '</ul>'; inList = false; }
          if (line.trim()) html += `<p>${escHtml(line)}</p>`;
        }
      }
      if (inList) html += '</ul>';
      return html;
    }

    // Collapse/expand description in the list view.
    window.toggleSprintDesc = function(id) {
      const desc    = document.getElementById('desc-' + id);
      const chevron = document.getElementById('desc-chevron-' + id);
      if (!desc) return;
      const opening = desc.style.display === 'none';
      desc.style.display = opening ? '' : 'none';
      if (chevron) chevron.style.transform = opening ? 'rotate(-90deg)' : '';
    };

    // Auto-continue bullet points in the description textarea.
    // If the current line starts with •, pressing Enter starts the next line with • too.
    window.handleDescKeydown = function(e) {
      if (e.key !== 'Enter') return;
      const ta = e.target;
      const pos = ta.selectionStart;
      const text = ta.value;
      const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
      const currentLine = text.slice(lineStart, pos);
      if (/^- /.test(currentLine)) {
        e.preventDefault();
        const before = text.slice(0, pos);
        const after  = text.slice(ta.selectionEnd);
        ta.value = before + '\n- ' + after;
        const newPos = pos + 3;
        ta.setSelectionRange(newPos, newPos);
      }
    };

    // ── Seed Data ─────────────────────────────────────────────────────────────────
    async function seedIfEmpty() {
      const existingInits = await getDocs(collection(db, 'initiatives'));
      if (!existingInits.empty) return;

      const batch = writeBatch(db);

      // Settings
      batch.set(doc(db, 'settings', 'config'), {
        kickoff_dow: 3, review_offset: 15, handoff_offset: 1, release_offset: 1, lead_time: 0
      });

      // Initiatives
      const platRef = doc(collection(db, 'initiatives'));
      batch.set(platRef, { name: 'Platinum', order: 0, color_index: 0 });
      const genRef = doc(collection(db, 'initiatives'));
      batch.set(genRef, { name: 'General', order: 1, color_index: 1 });

      // Epics
      const custRef = doc(collection(db, 'epics'));
      batch.set(custRef, { initiative_id: platRef.id, name: 'Customer Maintenance', order: 0 });
      const jobRef = doc(collection(db, 'epics'));
      batch.set(jobRef, { initiative_id: platRef.id, name: 'Job Maintenance', order: 1 });
      const ticketRef = doc(collection(db, 'epics'));
      batch.set(ticketRef, { initiative_id: genRef.id, name: 'Tickets', order: 0 });

      // Sprints (global_order follows original sheet row order)
      const sprintData = [
        {
          epic_id: custRef.id, initiative_id: platRef.id,
          sprint_number: '1.5', global_order: 0,
          description: 'Customers will be able to View/Edit Customer Information',
          resources: [], length_weeks: 4, manual_kickoff: '2026-07-01'
        },
        {
          epic_id: custRef.id, initiative_id: platRef.id,
          sprint_number: '1.51', global_order: 1,
          description: 'Add general contact, MM logins, feedback flyout',
          resources: [], length_weeks: 2, manual_kickoff: null
        },
        {
          epic_id: jobRef.id, initiative_id: platRef.id,
          sprint_number: '1.25', global_order: 2,
          description: 'View/Edit Print jobs with feedback flyout',
          resources: [], length_weeks: 4, manual_kickoff: null
        },
        {
          epic_id: ticketRef.id, initiative_id: genRef.id,
          sprint_number: '1.5', global_order: 3,
          description: 'iron PDF? rework ticket generation in preparation for job maintenance changes',
          resources: [], length_weeks: 4, manual_kickoff: null
        },
        {
          epic_id: custRef.id, initiative_id: platRef.id,
          sprint_number: '1.75', global_order: 4,
          description: 'Full Management',
          resources: [], length_weeks: 4, manual_kickoff: null
        },
        {
          epic_id: jobRef.id, initiative_id: platRef.id,
          sprint_number: '1.75', global_order: 5,
          description: 'Full Management',
          resources: [], length_weeks: 8, manual_kickoff: null
        },
      ];

      sprintData.forEach(s => {
        const ref = doc(collection(db, 'sprints'));
        batch.set(ref, s);
      });

      await batch.commit();
      console.log('Seeded initial data');
    }
    const loadMessages = [
      'Searching for Grumble Goblins...',
      'Journeying through the Gold database...',
      'Grabbing a honeybun...'
    ]
    document.addEventListener("DOMContentLoaded", (event) => {
      const randomIndex = Math.floor(Math.random() * loadMessages.length);
        document.getElementById("load-msg").textContent = loadMessages[randomIndex]
    });

    // ── Firestore Listeners ───────────────────────────────────────────────────────
    function checkAllLoaded() {
      if (Object.values(loaded).every(v => v)) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        document.getElementById('init-rail').style.display = 'flex';
        document.getElementById('conn-dot').className = 'dot green';
        document.getElementById('conn-dot').title = 'Connected';
        updateHeaders();
        render();
      }
    }

    onSnapshot(doc(db, 'settings', 'config'), snap => {
      if (snap.exists()) settings = { ...settings, ...snap.data() };
      loaded.settings = true;
      updateHeaders();
      checkAllLoaded();
      if (loaded.sprints) render();
    });

    onSnapshot(query(collection(db, 'initiatives'), orderBy('order')), snap => {
      initiatives = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      loaded.initiatives = true;
      checkAllLoaded();
      if (Object.values(loaded).every(v => v)) render();
    });

    onSnapshot(query(collection(db, 'epics'), orderBy('order')), snap => {
      const raw = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Assign color_index to any epic that doesn't have one (created before this feature).
      // Group by initiative, then stamp each epic's position as its index.
      const countPerInit = {};
      epics = raw.map(e => {
        if (e.color_index != null) return e;
        const initId = e.initiative_id || '__none__';
        if (countPerInit[initId] == null) countPerInit[initId] = 0;
        return { ...e, color_index: countPerInit[initId]++ };
      });
      loaded.epics = true;
      checkAllLoaded();
      if (Object.values(loaded).every(v => v)) render();
    });

    onSnapshot(query(collection(db, 'sprints'), orderBy('global_order')), snap => {
      sprints = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      loaded.sprints = true;
      checkAllLoaded();
      if (Object.values(loaded).every(v => v)) {
        render();
        pruneOrphans();
      }
    });

    async function pruneOrphans() {
      const batch = writeBatch(db);
      let changes = 0;
      initiatives.forEach(init => {
        if (!sprints.some(s => s.initiative_id === init.id)) {
          batch.delete(doc(db, 'initiatives', init.id));
          changes++;
        }
      });
      epics.forEach(epic => {
        if (!sprints.some(s => s.epic_id === epic.id)) {
          batch.delete(doc(db, 'epics', epic.id));
          changes++;
        }
      });
      if (changes) await batch.commit();
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    (async () => {
      try {
        await seedIfEmpty();
      } catch (e) {
        // May fail if data already exists, that's fine
        console.log('Seed check:', e.message);
      }
    })();
  </script>
